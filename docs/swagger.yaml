host: localhost:8080
info:
  contact:
    name: API Support
  description: |-
    REST API for manga reading application.
    Authentication uses HTTP-only cookies. After signing in via POST /users/sign-in,
    the server sets two cookies: **access_token** (short-lived JWT) and **refresh_token** (long-lived JWT).
    All protected endpoints require a valid access_token cookie.
    Use the "Authorize" button below and paste your access_token value to test protected endpoints.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Manga-Go API
  version: "1.0"
paths:
  /authors:
    get:
      consumes:
      - application/json
      description: Get paginated list of authors
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/manga-go_internal_app_api_common_response.Result'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/manga-go_internal_app_api_common_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/manga-go_internal_app_api_common_response.Response'
      security:
      - AccessToken: []
      summary: List authors
      tags:
      - Author
    post:
